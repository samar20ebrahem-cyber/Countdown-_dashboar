<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Countdown Dashboar</title>
</head>
<body>
    <main class="countdown-card">
        <header class="countdown">
            <h1>My University Journey</h1>
            <p> Countdown to the officil stat of college</p>
            
        </header>
        <div class="timer-container">
            <div class="time-box">
                <span class="label">Days</span>
                <span class="number" id="Days"></span>
         
            </div>
             
            
            <div class="time-box">
                <span class="label">Hours</span>
                <span class="number" id="Hours"></span>
            </div>

            
            

            <div class="time-box">
                <span class="label">Minutes </span>
                <span class="number" id="Minutes"></span>
            </div>

            
            

            <div class="time-box">
                <span class="label">Seconds</span>
                <span class="number" id="Seconds"></span>  
            </div>

            
            

            <div class="time-box">
                <span class="label">mSeconds </span>
                <span class="number" id="mSeconds"></span>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
